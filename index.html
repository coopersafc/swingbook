<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SwingBook" />
  <meta name="theme-color" content="#080b10" />
  <title>SwingBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080b10; overscroll-behavior: none; }

    :root {
      --bg: #080b10;
      --bg2: #0d1117;
      --card: #111820;
      --card2: #161e2a;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent2: #00b4cc;
      --accent-dim: rgba(0,229,255,0.08);
      --green: #00e5a0;
      --green-dim: rgba(0,229,160,0.1);
      --red: #ff3d6b;
      --red-dim: rgba(255,61,107,0.1);
      --gold: #ffd166;
      --gold-dim: rgba(255,209,102,0.1);
      --text: #e2eaf5;
      --text2: #8ba0b8;
      --muted: #4a5d72;
    }

    body {
      font-family: 'DM Mono', monospace;
      color: var(--text);
      max-width: 500px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(ellipse 60% 40% at 80% 0%, rgba(0,229,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 0% 100%, rgba(0,229,160,0.03) 0%, transparent 50%),
        var(--bg);
      min-height: 100vh;
    }

    input, select, button, textarea {
      font-family: 'DM Mono', monospace;
      -webkit-appearance: none; appearance: none;
    }
    input, select, textarea { font-size: 16px !important; }

    /* ── Header ── */
    .header {
      padding: 52px 20px 16px;
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(8,11,16,0.95);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .header-left {}
    .header-logo {
      font-family: 'DM Mono', monospace;
      font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .header-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .refresh-btn {
      background: var(--accent-dim); border: 1px solid var(--border);
      border-radius: 6px; color: var(--accent); font-size: 9px;
      letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 10px;
      cursor: pointer;
    }
    .refresh-btn:active { background: rgba(0,229,255,0.15); }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-dot.loading { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Period Filter ── */
    .period-bar {
      display: flex; gap: 0; margin: 16px 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .period-btn {
      flex: 1; padding: 9px 4px; background: transparent;
      border: none; color: var(--muted);
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
      border-right: 1px solid var(--border);
    }
    .period-btn:last-child { border-right: none; }
    .period-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* ── Stats Grid ── */
    .stats-section { padding: 0 20px; margin-bottom: 4px; }
    .section-label {
      font-size: 9px; color: var(--muted); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 10px; margin-top: 16px;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 14px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--border);
    }
    .stat-card.pos::before { background: var(--green); }
    .stat-card.neg::before { background: var(--red); }
    .stat-card.accent::before { background: var(--accent); }
    .stat-card.gold::before { background: var(--gold); }

    .stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 18px; font-weight: 700; color: var(--text);
      line-height: 1; margin-bottom: 5px;
    }
    .stat-val.pos { color: var(--green); }
    .stat-val.neg { color: var(--red); }
    .stat-val.accent { color: var(--accent); }
    .stat-val.gold { color: var(--gold); }
    .stat-val.sm { font-size: 16px; }
    .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; line-height: 1.4; }
    .stat-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

    /* ── Monthly breakdown ── */
    .month-list { margin: 0 20px; }
    .month-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 6px;
    }
    .month-name { font-size: 11px; color: var(--text2); letter-spacing: 1px; }
    .month-trades { font-size: 9px; color: var(--muted); margin-top: 2px; }
    .month-right { text-align: right; }
    .month-pnl { font-size: 13px; font-weight: 700; }
    .month-pct { font-size: 10px; margin-top: 2px; }

    /* ── Trade List ── */
    .trade-list { margin: 0 20px; padding-bottom: 100px; }
    .trade-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 6px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .trade-row:active { border-color: var(--accent); }
    .trade-left {}
    .trade-header { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .trade-ticker { font-size: 14px; font-weight: 700; }
    .badge {
      font-size: 8px; padding: 2px 6px; border-radius: 4px;
      letter-spacing: 1px; font-weight: 700;
    }
    .badge-long { background: var(--green-dim); color: var(--green); }
    .badge-short { background: var(--red-dim); color: var(--red); }
    .badge-open { background: var(--gold-dim); color: var(--gold); }
    .trade-meta { font-size: 10px; color: var(--muted); }
    .trade-right { text-align: right; }
    .trade-pnl { font-size: 13px; font-weight: 700; }
    .trade-pct { font-size: 10px; margin-top: 2px; }

    /* ── Detail modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(8,11,16,0.85); backdrop-filter: blur(8px);
      z-index: 50; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 24px 20px 48px;
      width: 100%; max-width: 500px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-ticker { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700; }
    .modal-pnl-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin: 16px 0;
    }
    .modal-pnl-big { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 700; }
    .modal-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-key { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .modal-val { font-size: 13px; font-weight: 700; }
    .modal-close {
      width: 100%; margin-top: 20px; padding: 14px;
      background: var(--border); border: none; border-radius: 10px;
      color: var(--text); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 500px;
      background: rgba(13,17,23,0.97); border-top: 1px solid var(--border);
      display: flex; z-index: 30;
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }
    .nav-btn {
      flex: 1; background: none; border: none;
      padding: 10px 0 8px; cursor: pointer;
      color: var(--muted); transition: color 0.15s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 18px; }
    .nav-label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 2px; }

    /* ── Views ── */
    .view { display: none; padding-bottom: 80px; }
    .view.active { display: block; }

    /* ── Loading / Error ── */
    .state-msg {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 12px; line-height: 2;
    }
    .state-msg .big { font-family: 'DM Mono', monospace; font-size: 32px; margin-bottom: 8px; }

    /* ── Filter tabs (trades view) ── */
    .filter-row { display: flex; margin: 12px 20px; gap: 0; }
    .filter-btn {
      flex: 1; padding: 9px 0; background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .filter-btn:first-child { border-radius: 8px 0 0 8px; }
    .filter-btn:last-child { border-radius: 0 8px 8px 0; }

    /* ── Empty ── */
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 11px; line-height: 2; }

    /* ── Account Size ── */
    .acct-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 20px 4px; padding: 10px 14px;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    }
    .acct-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .acct-value { font-size: 13px; font-weight: 700; color: var(--accent); cursor: pointer; }
    .acct-value:hover { opacity: 0.8; }

    .acct-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(8,11,16,0.9); backdrop-filter: blur(8px);
      z-index: 60; align-items: center; justify-content: center; padding: 20px;
    }
    .acct-modal-overlay.open { display: flex; }
    .acct-modal {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 360px;
      animation: slideUp 0.2s ease;
    }
    .acct-modal-title { font-size: 12px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .acct-modal-desc { font-size: 11px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
    .acct-input-wrap { position: relative; margin-bottom: 16px; }
    .acct-input-prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 14px; font-weight: 700; }
    .acct-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 12px 12px 28px;
      color: var(--text); font-size: 16px; outline: none;
    }
    .acct-input:focus { border-color: var(--accent); }
    .acct-save-btn {
      width: 100%; padding: 13px; background: var(--accent); border: none;
      border-radius: 8px; color: #000; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 700; cursor: pointer;
    }
    .acct-cancel-btn {
      width: 100%; padding: 10px; background: none; border: none;
      color: var(--muted); font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">SwingBook</div>
      <div class="header-sub" id="header-sub">Loading...</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadData()">↻ Sync</button>
      <div class="status-dot loading" id="status-dot"></div>
    </div>
  </div>

  <!-- PERIOD BAR -->
  <div class="period-bar">
    <button class="period-btn" data-period="1M" onclick="setPeriod('1M')">1M</button>
    <button class="period-btn" data-period="3M" onclick="setPeriod('3M')">3M</button>
    <button class="period-btn" data-period="6M" onclick="setPeriod('6M')">6M</button>
    <button class="period-btn active" data-period="YTD" onclick="setPeriod('YTD')">YTD</button>
    <button class="period-btn" data-period="ALL" onclick="setPeriod('ALL')">ALL</button>
  </div>

  <!-- ACCOUNT SIZE BAR -->
  <div class="acct-bar">
    <span class="acct-label">Account Size</span>
    <span class="acct-value" id="acct-display" onclick="openAcctModal()">Tap to set</span>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="view-dashboard" class="view active">
    <div id="dashboard-content">
      <div class="state-msg"><div class="big">⏳</div>Loading trades...</div>
    </div>
  </div>

  <!-- MONTHLY VIEW -->
  <div id="view-monthly" class="view">
    <div id="monthly-content"></div>
  </div>

  <!-- TRADES VIEW -->
  <div id="view-trades" class="view">
    <div class="filter-row">
      <button class="filter-btn active" data-tf="ALL" onclick="setTradeFilter('ALL')">All</button>
      <button class="filter-btn" data-tf="OPEN" onclick="setTradeFilter('OPEN')">Open</button>
      <button class="filter-btn" data-tf="CLOSED" onclick="setTradeFilter('CLOSED')">Closed</button>
    </div>
    <div id="trades-content"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showView('dashboard')">
      <div class="nav-icon">📊</div>
      <span class="nav-label">Stats</span>
    </button>
    <button class="nav-btn" id="nav-monthly" onclick="showView('monthly')">
      <div class="nav-icon">📅</div>
      <span class="nav-label">Monthly</span>
    </button>
    <button class="nav-btn" id="nav-trades" onclick="showView('trades')">
      <div class="nav-icon">📋</div>
      <span class="nav-label">Trades</span>
    </button>
  </nav>

</div>

<!-- ACCOUNT SIZE MODAL -->
<div class="acct-modal-overlay" id="acct-modal">
  <div class="acct-modal">
    <div class="acct-modal-title">Account Size</div>
    <div class="acct-modal-desc">Enter your total trading account size. This is used to calculate your true % return instead of capital deployed.</div>
    <div class="acct-input-wrap">
      <span class="acct-input-prefix">$</span>
      <input class="acct-input" id="acct-input" type="text" inputmode="decimal" placeholder="10000" />
    </div>
    <button class="acct-save-btn" onclick="saveAcctSize()">Save</button>
    <button class="acct-cancel-btn" onclick="closeAcctModal()">Cancel</button>
  </div>
</div>

<!-- TRADE DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
  const SHEET_ID = '1rBMeNenK3I6KnaRpTpQ2-FXnfiaqs81OIjhIFfVDtvw';

  let allTrades = [];
  let currentPeriod = 'YTD';
  let currentView = 'dashboard';
  let tradeFilter = 'ALL';
  let accountSize = parseFloat(localStorage.getItem('swingbook-acct-size')) || null;

  // ── Load from Google Sheets via CORS proxy ──
  function loadData() {
    const dot = document.getElementById('status-dot');
    const sub = document.getElementById('header-sub');
    dot.className = 'status-dot loading';
    sub.textContent = 'Syncing...';

    // Direct CSV export URL — works when hosted online (GitHub Pages)
    const csvUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&sheet=Sheet1';

    fetch(csvUrl)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(text => {
        allTrades = parseCSV(text);
        dot.className = 'status-dot';
        const now = new Date();
        sub.textContent = 'Synced ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
        renderAll();
      })
      .catch(e => {
        dot.className = 'status-dot error';
        sub.textContent = 'Sync failed';
        document.getElementById('dashboard-content').innerHTML =
          '<div class="state-msg">' +
          '<div class="big">⚠️</div>' +
          'Could not load sheet data.<br><br>' +
          'Please check:<br>' +
          '1. Sheet is set to <strong style="color:var(--accent)">"Anyone with the link can view"</strong><br>' +
          '2. The sheet name tab is called <strong style="color:var(--accent)">Sheet1</strong><br><br>' +
          '<small style="color:var(--muted)">Error: ' + e.message + '</small></div>';
      });
  }

  function parseCSV(text) {
    if (!text) return [];
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const trades = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = [];
      let current = '', inQuotes = false;
      for (let c = 0; c < lines[i].length; c++) {
        const ch = lines[i][c];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
        else { current += ch; }
      }
      cols.push(current.trim());
      const clean = (v) => (v || '').replace(/"/g,'').trim();
      const ticker = clean(cols[0]).toUpperCase();
      if (!ticker || ticker === 'TICKER') continue;
      trades.push({
        id: i,
        ticker,
        direction: (clean(cols[1]) || 'LONG').toUpperCase(),
        entryDate:  clean(cols[2]),
        exitDate:   clean(cols[3]),
        entryPrice: clean(cols[4]),
        exitPrice:  clean(cols[5]),
        quantity:   clean(cols[6]),
        fees:       clean(cols[7]),
        notes:      clean(cols[10]) || clean(cols[8]) || '',
      });
    }
    return trades;
  }

  // ── Helpers ──
  function calcPnL(t) {
    const entry = parseFloat(t.entryPrice), exit = parseFloat(t.exitPrice);
    const qty = parseFloat(t.quantity), fees = parseFloat(t.fees) || 0;
    if (!entry || !exit || !qty) return null;
    const raw = t.direction === 'LONG' ? (exit - entry) * qty : (entry - exit) * qty;
    return raw - fees;
  }
  function calcPct(t) {
    const entry = parseFloat(t.entryPrice), exit = parseFloat(t.exitPrice);
    if (!entry || !exit) return null;
    return t.direction === 'LONG' ? ((exit - entry) / entry) * 100 : ((entry - exit) / entry) * 100;
  }
  function fmtUSD(n) {
    if (n === null || isNaN(n)) return '—';
    return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
  }
  function fmtPct(n) {
    if (n === null || isNaN(n)) return '—';
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }

  function parseDate(str) {
    if (!str) return null;
    if (str.includes('/')) {
      const parts = str.split('/');
      if (parts.length === 3) {
        // Could be MM/DD/YYYY or DD/MM/YYYY — assume MM/DD/YYYY
        return new Date(parts[2], parts[0] - 1, parts[1]);
      }
    }
    const d = new Date(str);
    return isNaN(d) ? null : d;
  }

  function getMonthKey(dateStr) {
    const d = parseDate(dateStr);
    if (!d) return null;
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  }

  function getMonthLabel(key) {
    const [y, m] = key.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(m) - 1] + ' ' + y;
  }

  // ── Period filtering ──
  function filterByPeriod(trades, period) {
    const now = new Date();
    const closed = trades.filter(t => t.exitDate && t.exitPrice);
    if (period === 'ALL') return closed;
    return closed.filter(t => {
      const d = parseDate(t.exitDate);
      if (!d) return false;
      if (period === 'YTD') return d.getFullYear() === now.getFullYear();
      const months = period === '1M' ? 1 : period === '3M' ? 3 : 6;
      const cutoff = new Date(now);
      cutoff.setMonth(cutoff.getMonth() - months);
      return d >= cutoff;
    });
  }

  // ── Views ──
  function showView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + v).classList.add('active');
    currentView = v;
    if (v === 'dashboard') renderDashboard();
    if (v === 'monthly') renderMonthly();
    if (v === 'trades') renderTrades();
  }

  function setPeriod(p) {
    currentPeriod = p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === p));
    renderAll();
  }

  function setTradeFilter(f) {
    tradeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === f));
    renderTrades();
  }

  function renderAll() {
    if (currentView === 'dashboard') renderDashboard();
    if (currentView === 'monthly') renderMonthly();
    if (currentView === 'trades') renderTrades();
  }

  // ── Dashboard ──
  function renderDashboard() {
    const el = document.getElementById('dashboard-content');
    if (!allTrades.length) {
      el.innerHTML = '<div class="state-msg"><div class="big">📭</div>No trades found.<br>Add some to your Google Sheet.</div>';
      return;
    }
    const periodTrades = filterByPeriod(allTrades, currentPeriod);
    const openTrades = allTrades.filter(t => !t.exitPrice || !t.exitDate);
    const totalPnL = periodTrades.reduce((s, t) => s + (calcPnL(t) || 0), 0);
    const wins = periodTrades.filter(t => (calcPnL(t) || 0) > 0);
    const losses = periodTrades.filter(t => (calcPnL(t) || 0) < 0);
    const winRate = periodTrades.length ? (wins.length / periodTrades.length) * 100 : 0;
    const avgWin = wins.length ? wins.reduce((s, t) => s + calcPnL(t), 0) / wins.length : null;
    const avgLoss = losses.length ? losses.reduce((s, t) => s + calcPnL(t), 0) / losses.length : null;
    const profitFactor = (avgWin && avgLoss && avgLoss !== 0) ? Math.abs(avgWin / avgLoss) : null;
    const totalInvested = periodTrades.reduce((s, t) => s + (parseFloat(t.entryPrice) * parseFloat(t.quantity) || 0), 0);
    const returnPct = accountSize ? (totalPnL / accountSize) * 100 : (totalInvested > 0 ? (totalPnL / totalInvested) * 100 : null);
    const pnlList = periodTrades.map(t => calcPnL(t)).filter(n => n !== null);
    const bestTrade = pnlList.length ? Math.max(...pnlList) : null;
    const worstTrade = pnlList.length ? Math.min(...pnlList) : null;
    const holdDays = periodTrades.map(t => {
      const e = parseDate(t.entryDate), x = parseDate(t.exitDate);
      if (!e || !x) return null;
      return Math.round((x - e) / 86400000);
    }).filter(n => n !== null);
    const avgHold = holdDays.length ? holdDays.reduce((a, b) => a + b, 0) / holdDays.length : null;
    const periodLabel = currentPeriod === 'YTD' ? 'YTD ' + new Date().getFullYear() :
      currentPeriod === 'ALL' ? 'All Time' : 'Last ' + currentPeriod;

    el.innerHTML =
      '<div class="stats-section">' +
      '<div class="section-label">' + periodLabel + ' · ' + periodTrades.length + ' closed trades</div>' +
      '<div class="stat-grid">' +
        '<div class="stat-card ' + (totalPnL >= 0 ? 'pos' : 'neg') + '">' +
          '<div class="stat-val ' + (totalPnL >= 0 ? 'pos' : 'neg') + '">' + fmtUSD(totalPnL) + '</div>' +
          '<div class="stat-label">Total P&L</div></div>' +
        '<div class="stat-card ' + (returnPct !== null && returnPct >= 0 ? 'pos' : 'neg') + '">' +
          '<div class="stat-val ' + (returnPct !== null && returnPct >= 0 ? 'pos' : 'neg') + '">' + fmtPct(returnPct) + '</div>' +
          '<div class="stat-label">Return %</div></div>' +
      '</div>' +
      '<div class="stat-grid" style="margin-top:8px">' +
        '<div class="stat-card ' + (winRate >= 50 ? 'accent' : 'neg') + '">' +
          '<div class="stat-val ' + (winRate >= 50 ? 'accent' : 'neg') + '">' + winRate.toFixed(0) + '%</div>' +
          '<div class="stat-label">Win Rate</div>' +
          '<div class="stat-sub">' + wins.length + 'W / ' + losses.length + 'L</div></div>' +
        '<div class="stat-card gold">' +
          '<div class="stat-val gold sm">' + (profitFactor !== null ? profitFactor.toFixed(2) + 'x' : '—') + '</div>' +
          '<div class="stat-label">Profit Factor</div>' +
          '<div class="stat-sub">win/loss ratio</div></div>' +
      '</div>' +
      '<div class="stat-grid" style="margin-top:8px">' +
        '<div class="stat-card pos"><div class="stat-val pos sm">' + fmtUSD(avgWin) + '</div><div class="stat-label">Avg Win</div></div>' +
        '<div class="stat-card neg"><div class="stat-val neg sm">' + fmtUSD(avgLoss) + '</div><div class="stat-label">Avg Loss</div></div>' +
      '</div>' +
      '<div class="stat-grid-3" style="margin-top:8px">' +
        '<div class="stat-card pos"><div class="stat-val pos sm">' + fmtUSD(bestTrade) + '</div><div class="stat-label">Best</div></div>' +
        '<div class="stat-card neg"><div class="stat-val neg sm">' + fmtUSD(worstTrade) + '</div><div class="stat-label">Worst</div></div>' +
        '<div class="stat-card accent"><div class="stat-val accent sm">' + (avgHold !== null ? avgHold.toFixed(0) + 'd' : '—') + '</div><div class="stat-label">Avg Hold</div></div>' +
      '</div>' +
      (openTrades.length > 0 ?
        '<div class="section-label" style="margin-top:16px">Open Positions · ' + openTrades.length + '</div>' +
        openTrades.map(t => tradeRowHTML(t)).join('') : '') +
      '<div class="section-label" style="margin-top:16px">Recent Closed</div>' +
      (periodTrades.length ? periodTrades.slice(-5).reverse().map(t => tradeRowHTML(t)).join('') :
        '<div class="empty">No closed trades in this period.</div>') +
      '</div>';
  }

  // ── Monthly Breakdown ──
  function renderMonthly() {
    const el = document.getElementById('monthly-content');
    const closed = allTrades.filter(t => t.exitDate && t.exitPrice);
    if (!closed.length) { el.innerHTML = '<div class="state-msg"><div class="big">📅</div>No closed trades yet.</div>'; return; }

    const byMonth = {};
    closed.forEach(t => {
      const key = getMonthKey(t.exitDate);
      if (!key) return;
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(t);
    });

    const sortedKeys = Object.keys(byMonth).sort().reverse();
    const byYear = {};
    sortedKeys.forEach(key => {
      const year = key.split('-')[0];
      if (!byYear[year]) byYear[year] = [];
      byYear[year].push(...byMonth[key]);
    });

    let html = '<div style="padding:0 20px 100px">';
    Object.keys(byYear).sort().reverse().forEach(year => {
      const yt = byYear[year];
      const yPnL = yt.reduce((s, t) => s + (calcPnL(t) || 0), 0);
      const yInv = yt.reduce((s, t) => s + (parseFloat(t.entryPrice) * parseFloat(t.quantity) || 0), 0);
      const yRet = yInv > 0 ? (yPnL / yInv) * 100 : null;
      const yWins = yt.filter(t => (calcPnL(t) || 0) > 0).length;
      const yWR = yt.length ? (yWins / yt.length * 100).toFixed(0) : 0;
      html += '<div style="margin-bottom:6px;margin-top:16px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:12px">' +
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:18px;font-weight:700;color:var(--accent)">' + year + '</div>' +
          '<div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1.5px">' + yt.length + ' TRADES · ' + yWR + '% WIN RATE</div></div>' +
          '<div style="text-align:right">' +
            '<div style="font-size:16px;font-weight:700;color:' + (yPnL >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtUSD(yPnL) + '</div>' +
            '<div style="font-size:11px;color:' + (yRet !== null && yRet >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtPct(yRet) + '</div>' +
          '</div>' +
        '</div></div>';

      sortedKeys.filter(k => k.startsWith(year)).forEach(key => {
        const mt = byMonth[key];
        const mPnL = mt.reduce((s, t) => s + (calcPnL(t) || 0), 0);
        const mInv = mt.reduce((s, t) => s + (parseFloat(t.entryPrice) * parseFloat(t.quantity) || 0), 0);
        const mRet = mInv > 0 ? (mPnL / mInv) * 100 : null;
        const mWins = mt.filter(t => (calcPnL(t) || 0) > 0).length;
        html += '<div class="month-row">' +
          '<div><div class="month-name">' + getMonthLabel(key) + '</div>' +
          '<div class="month-trades">' + mt.length + ' trades · ' + mWins + 'W/' + (mt.length - mWins) + 'L</div></div>' +
          '<div class="month-right">' +
            '<div class="month-pnl" style="color:' + (mPnL >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtUSD(mPnL) + '</div>' +
            '<div class="month-pct" style="color:' + (mRet !== null && mRet >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtPct(mRet) + '</div>' +
          '</div></div>';
      });
    });
    html += '</div>';
    el.innerHTML = html;
  }

  // ── Trades List ──
  function renderTrades() {
    const el = document.getElementById('trades-content');
    let list = tradeFilter === 'OPEN' ? allTrades.filter(t => !t.exitPrice || !t.exitDate)
      : tradeFilter === 'CLOSED' ? allTrades.filter(t => t.exitPrice && t.exitDate)
      : allTrades;
    list = list.slice().reverse();
    if (!list.length) { el.innerHTML = '<div class="empty">No trades found.</div>'; return; }
    el.innerHTML = '<div style="padding:0 20px 100px">' + list.map(t => tradeRowHTML(t)).join('') + '</div>';
  }

  // ── Trade Row HTML ──
  function tradeRowHTML(t) {
    const pnl = calcPnL(t);
    const pct = calcPct(t);
    const isOpen = !t.exitPrice || !t.exitDate;
    const dirBadge = '<span class="badge badge-' + t.direction.toLowerCase() + '">' + t.direction + '</span>';
    const openBadge = isOpen ? '<span class="badge badge-open">OPEN</span>' : '';
    const pnlHTML = pnl !== null
      ? '<div class="trade-pnl" style="color:' + (pnl >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtUSD(pnl) + '</div>' +
        '<div class="trade-pct" style="color:' + (pnl >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtPct(pct) + '</div>'
      : '<div class="trade-pnl" style="color:var(--muted)">Open</div>';
    return '<div class="trade-row" onclick="openModal(' + t.id + ')">' +
      '<div class="trade-left">' +
        '<div class="trade-header"><span class="trade-ticker">' + t.ticker + '</span>' + dirBadge + openBadge + '</div>' +
        '<div class="trade-meta">' + (t.entryDate || '—') + ' · ' + t.quantity + ' @ $' + t.entryPrice + '</div>' +
      '</div>' +
      '<div class="trade-right">' + pnlHTML + '</div>' +
    '</div>';
  }

  // ── Modal ──
  function openModal(id) {
    const t = allTrades.find(t => t.id === id);
    if (!t) return;
    const pnl = calcPnL(t);
    const pct = calcPct(t);
    const isOpen = !t.exitPrice || !t.exitDate;
    const pnlColor = pnl !== null ? (pnl >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
    const holdDays = (() => {
      const e = parseDate(t.entryDate), x = parseDate(t.exitDate);
      if (!e || !x) return null;
      return Math.round((x - e) / 86400000);
    })();
    document.getElementById('modal-content').innerHTML =
      '<div class="modal-handle"></div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">' +
        '<span class="modal-ticker">' + t.ticker + '</span>' +
        '<span class="badge badge-' + t.direction.toLowerCase() + '">' + t.direction + '</span>' +
        (isOpen ? '<span class="badge badge-open">OPEN</span>' : '') +
      '</div>' +
      (pnl !== null ?
        '<div class="modal-pnl-card" style="border-color:' + pnlColor + '">' +
          '<div class="modal-pnl-big" style="color:' + pnlColor + '">' + fmtUSD(pnl) + '</div>' +
          '<div style="color:' + pnlColor + ';font-size:14px;margin-top:4px">' + fmtPct(pct) + '</div>' +
        '</div>' : '') +
      '<div class="modal-row"><span class="modal-key">Entry</span><span class="modal-val">$' + t.entryPrice + ' x ' + t.quantity + '</span></div>' +
      '<div class="modal-row"><span class="modal-key">Exit</span><span class="modal-val">' + (t.exitPrice ? '$' + t.exitPrice : '—') + '</span></div>' +
      '<div class="modal-row"><span class="modal-key">Entry Date</span><span class="modal-val">' + (t.entryDate || '—') + '</span></div>' +
      '<div class="modal-row"><span class="modal-key">Exit Date</span><span class="modal-val">' + (t.exitDate || '—') + '</span></div>' +
      (holdDays !== null ? '<div class="modal-row"><span class="modal-key">Hold Time</span><span class="modal-val">' + holdDays + ' days</span></div>' : '') +
      '<div class="modal-row"><span class="modal-key">Fees</span><span class="modal-val">' + (t.fees ? '$' + t.fees : '$0') + '</span></div>' +
      (t.notes ? '<div class="modal-row"><span class="modal-key">Notes</span><span class="modal-val" style="max-width:60%;text-align:right;font-size:11px">' + t.notes + '</span></div>' : '') +
      '<button class="modal-close" onclick="closeModal()">Close</button>';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
    }
  }

  // ── Account Size ──
  function updateAcctDisplay() {
    const el = document.getElementById('acct-display');
    if (accountSize) {
      el.textContent = '$' + accountSize.toLocaleString();
    } else {
      el.textContent = 'Tap to set';
    }
  }
  function openAcctModal() {
    document.getElementById('acct-input').value = accountSize || '';
    document.getElementById('acct-modal').classList.add('open');
    setTimeout(() => document.getElementById('acct-input').focus(), 100);
  }
  function closeAcctModal() {
    document.getElementById('acct-modal').classList.remove('open');
  }
  function saveAcctSize() {
    const val = parseFloat(document.getElementById('acct-input').value.replace(/[^0-9.]/g,''));
    if (!isNaN(val) && val > 0) {
      accountSize = val;
      localStorage.setItem('swingbook-acct-size', val);
    } else {
      accountSize = null;
      localStorage.removeItem('swingbook-acct-size');
    }
    updateAcctDisplay();
    closeAcctModal();
    renderAll();
  }

  // ── Init ──
  updateAcctDisplay();
  loadData();
</script>
</body>
</html>
